<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bill-Ones Tracker | Cloud Sync</title>
    <style>
        :root {
            --glass-bg: rgba(15, 25, 35, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-green: #4ade80;
            --accent-blue: #38bdf8;
            --danger-red: #fb7185;
            --text-main: #f1f5f9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #064e3b 100%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container { width: 100%; max-width: 900px; display: flex; flex-direction: column; gap: 20px; }

        /* Login Screen Overlay */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 20, 30, 0.95); z-index: 100;
            display: flex; align-items: center; justify-content: center; backdrop-filter: blur(15px);
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .user-info {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 0.8rem; margin-bottom: 10px; padding: 8px 15px;
            background: rgba(255,255,255,0.05); border-radius: 20px;
        }

        .budget-settings { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; font-size: 0.9rem; }
        .budget-input {
            width: 100px; padding: 4px; background: rgba(255,255,255,0.1);
            border: 1px solid var(--glass-border); border-radius: 4px; color: var(--accent-green);
            outline: none;
        }

        h1 { font-weight: 300; letter-spacing: 2px; text-align: center; margin-bottom: 15px; }

        .stat-value { font-size: 2rem; font-weight: bold; color: var(--accent-green); text-align: center; }
        
        .progress-bar-bg { background: rgba(255,255,255,0.1); height: 12px; border-radius: 6px; overflow: hidden; margin: 10px 0; }
        #progress-fill { height: 100%; width: 0%; background: var(--accent-green); transition: width 0.6s ease; }

        .form-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
        input, select, button { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); padding: 12px; border-radius: 8px; color: white; outline: none; }
        button { cursor: pointer; background: var(--accent-blue); color: #0f172a; font-weight: bold; border: none; transition: opacity 0.2s; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }

        .tabs { display: flex; gap: 10px; justify-content: center; margin-bottom: 15px; }
        .tab-btn { background: transparent; border: none; color: white; opacity: 0.5; padding: 8px 15px; cursor: pointer; }
        .tab-btn.active { opacity: 1; border-bottom: 2px solid var(--accent-green); }

        .expense-list { max-height: 400px; overflow-y: auto; margin-top: 10px; }
        .expense-item { display: grid; grid-template-columns: 1fr 120px 40px; padding: 12px; border-bottom: 1px solid var(--glass-border); align-items: center; }
        .item-category { font-size: 0.7rem; opacity: 0.5; display: block; text-transform: uppercase; }
        
        #loading-indicator { display: none; text-align: center; font-size: 0.8rem; color: var(--accent-blue); margin-bottom: 10px; font-style: italic; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="glass-card" style="width: 90%; max-width: 380px; text-align: center;">
        <h1>Bill-Ones</h1>
        <p style="font-size: 0.85rem; margin-bottom: 20px; opacity: 0.8;">Enter email to sync your data cloud</p>
        <form id="login-form" style="display: flex; flex-direction: column; gap: 15px;">
            <input type="email" id="user-email" placeholder="email@example.com" required>
            <button type="submit">Access My Tracker</button>
        </form>
    </div>
</div>

<div class="container">
    <header class="glass-card">
        <div class="user-info">
            <span>👤 <strong id="active-user-display">---</strong></span>
            <button style="background:none; color:var(--danger-red); font-size:0.75rem; cursor:pointer;" onclick="logout()">LOGOUT</button>
        </div>
        
        <div id="loading-indicator">Syncing with Google Sheets...</div>

        <div class="budget-container">
            <div class="budget-settings">
                <span>Monthly Budget: ₱</span>
                <input type="number" id="budget-input" class="budget-input" value="15000" onchange="saveBudgetLocally()">
            </div>
            <div style="display: flex; justify-content: space-between; font-size: 0.9rem;">
                <span id="budget-display">₱15,000.00</span>
                <span id="percent-display">0%</span>
            </div>
            <div class="progress-bar-bg"><div id="progress-fill"></div></div>
        </div>
        
        <div style="margin-top: 15px;">
            <p class="stat-value" id="total-spent">₱0.00</p>
            <p style="font-size: 0.75rem; opacity: 0.6; text-align: center; letter-spacing: 2px;">TOTAL SPENT</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="setFilter('daily', this)">Daily</button>
            <button class="tab-btn" onclick="setFilter('monthly', this)">Monthly</button>
            <button class="tab-btn" onclick="setFilter('yearly', this)">Yearly</button>
        </div>
    </header>

    <section class="glass-card">
        <form id="expense-form" class="form-group">
            <input type="text" id="item-name" placeholder="Item Name" required>
            <input type="number" id="item-amount" placeholder="Amount (PHP)" step="0.01" required>
            <select id="item-category">
                <option value="Food">Food</option>
                <option value="Transpo">Transpo</option>
                <option value="Bills">Bills</option>
                <option value="Shopping">Shopping</option>
                <option value="Others">Others</option>
            </select>
            <input type="date" id="item-date" required>
            <button type="submit" id="add-btn">Save to Cloud</button>
        </form>
    </section>

    <section class="glass-card">
        <div id="expense-list" class="expense-list"></div>
    </section>
</div>

<script>
    // --- 1. CONFIGURATION ---
    // REPLACE the URL below with your Google Apps Script Web App URL
    const SCRIPT_URL = "YOUR_GOOGLE_SCRIPT_WEB_APP_URL_HERE"; 
    
    let currentUser = localStorage.getItem('bill_ones_email') || null;
    let expenses = [];
    let currentFilter = 'monthly';
    const phFormatter = new Intl.NumberFormat('en-PH', { style: 'currency', currency: 'PHP' });

    // --- 2. INITIALIZATION ---
    async function init() {
        if (!currentUser) {
            document.getElementById('login-screen').style.display = 'flex';
        } else {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('active-user-display').innerText = currentUser;
            
            // Load saved budget
            const savedBudget = localStorage.getItem(`budget_${currentUser}`);
            if (savedBudget) document.getElementById('budget-input').value = savedBudget;
            
            await fetchFromCloud();
        }
    }

    // --- 3. CLOUD SYNC LOGIC ---
    async function fetchFromCloud() {
        toggleLoading(true);
        try {
            const response = await fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({ action: "get", email: currentUser })
            });
            const data = await response.json();
            
            if (Array.isArray(data)) {
                expenses = data.map(row => ({
                    date: row[1],
                    name: row[2],
                    category: row[3],
                    amount: parseFloat(row[4]) || 0
                }));
            }
            renderExpenses();
        } catch (e) {
            console.error("Fetch Error:", e);
        }
        toggleLoading(false);
    }

    async function sendToCloud(newExp) {
        toggleLoading(true);
        const budgetVal = document.getElementById('budget-input').value;
        try {
            await fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors", // Required for Google Scripts to avoid CORS errors
                body: JSON.stringify({
                    action: "add",
                    email: currentUser,
                    date: newExp.date,
                    name: newExp.name,
                    category: newExp.category,
                    amount: newExp.amount,
                    budget: budgetVal
                })
            });
            
            // Optimistic Update: Add to UI immediately
            expenses.unshift(newExp);
            renderExpenses();
        } catch (e) {
            alert("Error: Could not sync with Google Sheets.");
        }
        toggleLoading(false);
    }

    // --- 4. UI LOGIC ---
    function toggleLoading(show) {
        const indicator = document.getElementById('loading-indicator');
        const btn = document.getElementById('add-btn');
        if (indicator) indicator.style.display = show ? 'block' : 'none';
        if (btn) btn.disabled = show;
    }

    function saveBudgetLocally() {
        localStorage.setItem(`budget_${currentUser}`, document.getElementById('budget-input').value);
        renderExpenses();
    }

    function renderExpenses() {
        const budget = parseFloat(document.getElementById('budget-input').value) || 1;
        const now = new Date();
        
        const filtered = expenses.filter(exp => {
            const d = new Date(exp.date);
            if (currentFilter === 'daily') return d.toDateString() === now.toDateString();
            if (currentFilter === 'monthly') return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
            if (currentFilter === 'yearly') return d.getFullYear() === now.getFullYear();
            return true;
        });

        const total = filtered.reduce((s, e) => s + e.amount, 0);
        document.getElementById('total-spent').innerText = phFormatter.format(total);
        document.getElementById('budget-display').innerText = phFormatter.format(budget);

        const percent = Math.round((total / budget) * 100);
        document.getElementById('percent-display').innerText = percent + '%';
        const fill = document.getElementById('progress-fill');
        fill.style.width = Math.min(percent, 100) + '%';
        fill.style.background = total > budget ? 'var(--danger-red)' : 'var(--accent-green)';

        const listContainer = document.getElementById('expense-list');
        const sortedList = filtered.sort((a,b) => new Date(b.date) - new Date(a.date));

        if (sortedList.length === 0) {
            listContainer.innerHTML = '<p style="text-align:center; opacity:0.4; padding:20px;">No expenses recorded.</p>';
            return;
        }

        listContainer.innerHTML = sortedList.map(exp => `
            <div class="expense-item">
                <div>
                    <strong>${exp.name}</strong>
                    <span class="item-category">${exp.category} • ${exp.date}</span>
                </div>
                <div style="text-align:right"><strong>${phFormatter.format(exp.amount)}</strong></div>
                <div style="text-align:center; opacity:0.3; font-size:0.8rem;">☁️</div>
            </div>
        `).join('');
    }

    // --- 5. EVENT LISTENERS ---
    document.getElementById('login-form').addEventListener('submit', (e) => {
        e.preventDefault();
        currentUser = document.getElementById('user-email').value.toLowerCase();
        localStorage.setItem('bill_ones_email', currentUser);
        init();
    });

    document.getElementById('expense-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const newExp = {
            date: document.getElementById('item-date').value,
            name: document.getElementById('item-name').value,
            category: document.getElementById('item-category').value,
            amount: parseFloat(document.getElementById('item-amount').value)
        };
        await sendToCloud(newExp);
        e.target.reset();
        document.getElementById('item-date').valueAsDate = new Date();
    });

    function setFilter(f, el) {
        currentFilter = f;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        renderExpenses();
    }

    function logout() {
        if(confirm("Sign out and disconnect cloud sync?")) {
            localStorage.removeItem('bill_ones_email');
            location.reload();
        }
    }

    // Run on startup
    document.getElementById('item-date').valueAsDate = new Date();
    init();
</script>
</body>
</html>
