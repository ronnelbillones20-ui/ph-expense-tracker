<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bill-Ones | PH Expense Tracker</title>
    <style>
        :root {
            --glass-bg: rgba(10, 15, 25, 0.8);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-green: #2ecc71;
            --accent-blue: #3498db;
            --danger-red: #e74c3c;
            --text-main: #f8fafc;
            --input-fill: #16213e; /* Solid dark background for form elements */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; }

        body {
            background: radial-gradient(circle at top right, #064e3b, #020617 80%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container { width: 100%; max-width: 850px; display: flex; flex-direction: column; gap: 20px; }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        }

        .brand-header { text-align: center; margin-bottom: 20px; }
        .brand-header h1 { 
            font-size: 2.4rem; 
            letter-spacing: 4px; 
            background: linear-gradient(to right, #4ade80, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .budget-config {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
        }

        /* --- FORM STYLING (DARK DROPDOWNS) --- */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
        }

        input, select, button {
            background: var(--input-fill);
            border: 1px solid var(--glass-border);
            padding: 14px;
            border-radius: 10px;
            color: white;
            transition: 0.3s;
            appearance: none; /* Removes default OS styling */
        }

        /* Specifically target the options inside the dropdown */
        select option {
            background-color: #0f172a; /* Force dark background */
            color: white;
            padding: 10px;
        }

        input:focus, select:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 10px rgba(52, 152, 219, 0.3);
            outline: none;
        }

        .btn-add { background: var(--accent-blue); color: white; font-weight: 700; cursor: pointer; border: none; }
        .btn-add:hover { filter: brightness(1.2); transform: translateY(-2px); }

        /* Dashboard/Stats */
        .progress-bar-bg {
            background: rgba(255,255,255,0.05);
            height: 12px;
            border-radius: 6px;
            overflow: hidden;
            margin: 10px 0;
        }
        #progress-fill { height: 100%; width: 0%; background: var(--accent-green); transition: width 0.6s ease; }

        .view-tabs { display: flex; gap: 8px; justify-content: center; margin: 20px 0; }
        .tab { background: transparent; border: none; opacity: 0.5; padding: 8px 20px; cursor: pointer; }
        .tab.active { opacity: 1; border-bottom: 2px solid var(--accent-blue); color: var(--accent-blue); }

        /* Transaction List */
        .history-list { max-height: 300px; overflow-y: auto; margin-bottom: 15px; }
        .expense-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        /* Summary Table */
        .summary-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-top: 10px; }
        .summary-table th { text-align: left; opacity: 0.6; padding-bottom: 8px; }
        .summary-table td { padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }

        .del-btn { color: var(--danger-red); cursor: pointer; background: none; border: none; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="container">
    <header class="glass-card">
        <div class="brand-header">
            <h1>Bill-Ones</h1>
            <p style="font-size: 0.8rem; opacity: 0.6; letter-spacing: 1px;">Smart PH Recovery & Tracker</p>
        </div>

        <div class="budget-config">
            <span style="font-size: 0.85rem;">Monthly Goal:</span>
            <input type="number" id="user-budget" value="15000" oninput="updateBudget()" style="width: 120px; text-align: center;">
        </div>

        <div>
            <div style="display: flex; justify-content: space-between; font-size: 0.9rem;">
                <span id="stat-label">Total Spent</span>
                <span id="percent-label">0%</span>
            </div>
            <div class="progress-bar-bg"><div id="progress-fill"></div></div>
            <h2 id="total-amount" style="text-align: center; margin-top: 10px; color: var(--accent-green);">₱0.00</h2>
        </div>

        <div class="view-tabs">
            <button class="tab" onclick="changeView('daily', this)">Daily</button>
            <button class="tab active" onclick="changeView('monthly', this)">Monthly</button>
            <button class="tab" onclick="changeView('yearly', this)">Yearly</button>
        </div>
    </header>

    <section class="glass-card">
        <form id="tracker-form" class="form-grid">
            <input type="text" id="name" placeholder="Item Name" required>
            <input type="number" id="amount" placeholder="Amount (PHP)" required step="0.01">
            <select id="cat">
                <option value="Food">Food</option>
                <option value="Transpo">Transpo</option>
                <option value="Bills">Bills
