<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bill-Ones Expense Tracker | Night Forest</title>
    <style>
        :root {
            --glass-bg: rgba(15, 25, 35, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-green: #4ade80;
            --accent-blue: #38bdf8;
            --danger-red: #fb7185;
            --text-main: #f1f5f9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #064e3b 100%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Login Overlay */
        #login-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 20, 30, 0.9);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .login-card {
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        /* Glassmorphism Card Style */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .user-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            margin-bottom: 10px;
            padding: 5px 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
        }

        h1 { font-weight: 300; letter-spacing: 2px; text-align: center; margin-bottom: 10px; }

        /* Dashboard & Progress */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-box { text-align: center; }
        .stat-label { font-size: 0.8rem; opacity: 0.7; text-transform: uppercase; }
        .stat-value { font-size: 1.5rem; font-weight: bold; color: var(--accent-green); }

        .budget-container { margin-top: 15px; }
        .progress-bar-bg {
            background: rgba(255,255,255,0.1);
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
            margin: 8px 0;
        }
        #progress-fill {
            height: 100%;
            width: 0%;
            background: var(--accent-green);
            transition: width 0.5s ease, background 0.3s;
        }

        /* Form Controls */
        .form-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
        }

        input, select, button {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            padding: 12px;
            border-radius: 8px;
            color: white;
            outline: none;
        }

        button {
            cursor: pointer;
            background: var(--accent-blue);
            color: #0f172a;
            font-weight: bold;
            transition: transform 0.2s, opacity 0.2s;
        }

        button:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-export { background: transparent; border: 1px solid var(--accent-blue); color: var(--accent-blue); }
        .logout-btn { background: transparent; border: none; color: var(--danger-red); font-size: 0.7rem; padding: 5px; }

        /* Filter Tabs */
        .tabs { display: flex; gap: 10px; justify-content: center; margin-bottom: 15px; }
        .tab-btn { background: transparent; color: white; border: none; padding: 5px 15px; opacity: 0.5; }
        .tab-btn.active { opacity: 1; border-bottom: 2px solid var(--accent-green); }

        /* List Styling */
        .expense-list { max-height: 400px; overflow-y: auto; }
        .expense-item {
            display: grid;
            grid-template-columns: 1fr 1fr 100px 40px;
            padding: 12px;
            border-bottom: 1px solid var(--glass-border);
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .item-category { font-size: 0.75rem; opacity: 0.6; display: block; }
        .item-amount { font-weight: bold; text-align: right; }
        .delete-btn { color: var(--danger-red); background: none; border: none; cursor: pointer; text-align: center; }

        @media (max-width: 600px) {
            .expense-item { grid-template-columns: 1fr 80px 40px; }
        }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="glass-card login-card">
        <h1>Welcome</h1>
        <p style="margin-bottom: 20px; opacity: 0.8;">Enter email to monitor account</p>
        <form id="login-form" style="display: flex; flex-direction: column; gap: 15px;">
            <input type="email" id="user-email" placeholder="email@example.com" required>
            <button type="submit">Access Tracker</button>
        </form>
    </div>
</div>

<div class="container">
    <header class="glass-card">
        <div class="user-info">
            <span>Account: <strong id="active-user-display">None</strong></span>
            <button class="logout-btn" onclick="logout()">LOGOUT</button>
        </div>
        <h1>Bill-Ones Tracker</h1>
        <div class="budget-container">
            <div style="display: flex; justify-content: space-between; font-size: 0.9rem;">
                <span>Monthly Budget: <span id="budget-display">₱10,000.00</span></span>
                <span id="percent-display">0%</span>
            </div>
            <div class="progress-bar-bg">
                <div id="progress-fill"></div>
            </div>
        </div>
        
        <div class="dashboard-grid">
            <div class="stat-box">
                <p class="stat-label">Total Spent</p>
                <p class="stat-value" id="total-spent">₱0.00</p>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="setFilter('daily', this)">Daily</button>
            <button class="tab-btn" onclick="setFilter('monthly', this)">Monthly</button>
            <button class="tab-btn" onclick="setFilter('yearly', this)">Yearly</button>
        </div>
    </header>

    <section class="glass-card">
        <form id="expense-form" class="form-group">
            <input type="text" id="item-name" placeholder="Item Name" required>
            <input type="number" id="item-amount" placeholder="Amount (PHP)" step="0.01" required>
            <select id="item-category">
                <option value="Food">Food</option>
                <option value="Transpo">Transpo</option>
                <option value="Bills">Bills</option>
                <option value="Shopping">Shopee/Lazada</option>
                <option value="Others">Others</option>
            </select>
            <input type="date" id="item-date" required>
            <button type="submit">Add Expense</button>
        </form>
    </section>

    <section class="glass-card">
        <div id="expense-list" class="expense-list"></div>
        <div style="margin-top: 20px; display: flex; gap: 10px;">
            <button class="btn-export" onclick="exportToCSV()">Export to CSV</button>
            <button class="btn-export" style="border-color: var(--danger-red); color: var(--danger-red);" onclick="clearAll()">Clear Data</button>
        </div>
    </section>
</div>

<script>
    let currentUser = localStorage.getItem('bill_ones_active_user') || null;
    let expenses = [];
    let currentFilter = 'monthly';
    const MONTHLY_BUDGET = 15000;

    const phFormatter = new Intl.NumberFormat('en-PH', { style: 'currency', currency: 'PHP' });

    // UI Elements
    const loginScreen = document.getElementById('login-screen');
    const loginForm = document.getElementById('login-form');
    const activeUserDisplay = document.getElementById('active-user-display');
    const expenseForm = document.getElementById('expense-form');
    const expenseList = document.getElementById('expense-list');

    /**
     * AUTH LOGIC
     */
    function initApp() {
        if (currentUser) {
            loginScreen.style.display = 'none';
            activeUserDisplay.innerText = currentUser;
            // Load data specific to this email
            expenses = JSON.parse(localStorage.getItem(`expenses_${currentUser}`)) || [];
            renderExpenses();
        } else {
            loginScreen.style.display = 'flex';
        }
    }

    loginForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const email = document.getElementById('user-email').value.toLowerCase();
        localStorage.setItem('bill_ones_active_user', email);
        currentUser = email;
        initApp();
    });

    function logout() {
        if(confirm("Logout from account?")) {
            localStorage.removeItem('bill_ones_active_user');
            location.reload();
        }
    }

    /**
     * EXPENSE LOGIC
     */
    document.getElementById('item-date').valueAsDate = new Date();

    expenseForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const newExpense = {
            id: Date.now(),
            name: document.getElementById('item-name').value,
            amount: parseFloat(document.getElementById('item-amount').value),
            category: document.getElementById('item-category').value,
            date: document.getElementById('item-date').value
        };
        expenses.push(newExpense);
        saveAndRender();
        expenseForm.reset();
        document.getElementById('item-date').valueAsDate = new Date();
    });

    function saveAndRender() {
        localStorage.setItem(`expenses_${currentUser}`, JSON.stringify(expenses));
        renderExpenses();
    }

    function renderExpenses() {
        const now = new Date();
        const filtered = expenses.filter(exp => {
            const expDate = new Date(exp.date);
            if (currentFilter === 'daily') return expDate.toDateString() === now.toDateString();
            if (currentFilter === 'monthly') return expDate.getMonth() === now.getMonth() && expDate.getFullYear() === now.getFullYear();
            if (currentFilter === 'yearly') return expDate.getFullYear() === now.getFullYear();
            return true;
        });

        const total = filtered.reduce((sum, exp) => sum + exp.amount, 0);
        document.getElementById('total-spent').innerText = phFormatter.format(total);
        updateProgressBar(total);

        expenseList.innerHTML = filtered.sort((a,b) => new Date(b.date) - new Date(a.date)).map(exp => `
            <div class="expense-item">
                <div>
                    <strong>${exp.name}</strong>
                    <span class="item-category">${exp.category} • ${exp.date}</span>
                </div>
                <div class="item-amount">${phFormatter.format(exp.amount)}</div>
                <button class="delete-btn" onclick="deleteExpense(${exp.id})">✕</button>
            </div>
        `).join('');
    }

    function deleteExpense(id) {
        expenses = expenses.filter(exp => exp.id !== id);
        saveAndRender();
    }

    function setFilter(filter, el) {
        currentFilter = filter;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        el.classList.add('active');
        renderExpenses();
    }

    function updateProgressBar(currentSpend) {
        const fill = document.getElementById('progress-fill');
        const percentText = document.getElementById('percent-display');
        const percentage = Math.min((currentSpend / MONTHLY_BUDGET) * 100, 100);
        
        document.getElementById('budget-display').innerText = phFormatter.format(MONTHLY_BUDGET);
        percentText.innerText = Math.round((currentSpend / MONTHLY_BUDGET) * 100) + '%';
        fill.style.width = percentage + '%';
        fill.style.background = currentSpend > MONTHLY_BUDGET ? 'var(--danger-red)' : 'var(--accent-green)';
    }

    function exportToCSV() {
        if (expenses.length === 0) return alert("No data to export!");
        let csvContent = "data:text/csv;charset=utf-8,Date,Item,Category,Amount\n" + 
            expenses.map(e => `${e.date},${e.name},${e.category},${e.amount}`).join("\n");
        const link = document.createElement("a");
        link.href = encodeURI(csvContent);
        link.download = `Expenses_${currentUser}_${new Date().toLocaleDateString()}.csv`;
        link.click();
    }

    function clearAll() {
        if(confirm(`Clear ALL records for ${currentUser}?`)) {
            expenses = [];
            saveAndRender();
        }
    }

    // Run on Load
    initApp();
</script>

</body>
</html>
